name: ScholarMe CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

env:
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  NEXT_PUBLIC_SUPABASE_URL: "https://build-dummy.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "build-dummy-key"

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  # 1. Next.js Web Validation
  web-build:
    needs: [secret-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.1.2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check API Schemas
        run: bash scripts/check-api-schemas.sh
      - name: Check OpenAPI Drift
        run: |
          pnpm run openapi
          git diff --exit-code docs/openapi.json || (echo "OpenAPI spec is out of sync. Please run 'pnpm run openapi' and commit the changes." && exit 1)
      - name: Run ESLint
        run: pnpm run lint
      - name: Next.js cache
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Run Next.js Build
        run: pnpm run build

  # 2. Next.js Web Tests
  web-test:
    needs: [web-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.1.2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Tests with Coverage
        run: pnpm run test --coverage

  # 3. Performance & Bundle Audits
  performance-audit:
    needs: [web-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.1.2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Next.js cache
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Bundle Size Check
        run: |
          pnpm run build
          # Basic size limit assertion logic could go here or via Next.js bundle analyzer plugin
      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.13.x
          pnpm run start &
          sleep 5
          lhci autorun --upload.target=temporary-public-storage || echo "Lighthouse finished"

  # 4. Accessibility Audit
  accessibility-audit:
    needs: [web-build, web-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.1.2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install axe-cli
        run: |
          npm install -g @axe-core/cli
          npx browser-driver-manager install chrome
      - name: Next.js cache
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Build and Start Next.js Server
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          pnpm run start &
          sleep 5
      - name: Run accessibility audit
        run: axe http://localhost:3000 --exit

  # 5. Vercel Production Deployment
  # Note: VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID must be set in GitHub repository secrets
  deploy-web:
    needs: [secret-scan, web-build, web-test, accessibility-audit]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}


