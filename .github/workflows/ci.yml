name: ScholarMe CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

env:
  NEXT_PUBLIC_SUPABASE_URL: "https://hrwqxdtoncwhukqhsdjb.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyd3F4ZHRvbmN3aHVrcWhzZGpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NjA2NzIsImV4cCI6MjA4NzIzNjY3Mn0.dUVYhlFQCHZrYUGSMqxmfF3uO-GemoratEp0qWWlQLE"
  SUPABASE_SERVICE_ROLE_KEY: "dummy"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  # 1. Next.js Web Validation
  web-build:
    needs: [secret-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.1.2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Next.js Build
        run: pnpm run build

  # 2. Next.js Web Tests
  web-test:
    needs: [web-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.1.2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Tests
        run: pnpm run test

  # 4. Accessibility Audit
  accessibility-audit:
    needs: [web-build, web-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.1.2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install axe-cli
        run: |
          npm install -g @axe-core/cli
          npx browser-driver-manager install chrome
      - name: Build and Start Next.js Server
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          pnpm run start &
          sleep 5
      - name: Run accessibility audit
        run: axe http://localhost:3000 --exit

  # 5. Vercel Production Deployment
  # Note: VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID must be set in GitHub repository secrets
  deploy-web:
    needs: [secret-scan, web-build, web-test, accessibility-audit]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}


