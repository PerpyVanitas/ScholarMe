version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # Ignore minor/patch bumps for non-critical dependencies to reduce noise,
      # but security alerts will still create PRs overriding this.
      - dependency-name: "*"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]
